<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini Vadi: Kesintisiz Başlangıç</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; overflow: hidden; background-color: #1a2a1b; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        .hidden { display: none !important; }

        /* YATAY EKRAN UYARISI */
        #portrait-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        #portrait-warning svg { width: 80px; height: 80px; margin-bottom: 20px; fill: #f1c40f; animation: rotatePhone 2s infinite ease-in-out; }
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
        
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
            #game-container { display: none; }
        }
        @media screen and (orientation: landscape) {
            #portrait-warning { display: none; }
            #game-container { display: block; }
        }

        /* OYUN ARAYÜZÜ */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .top-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px;
            text-align: center; font-weight: bold; font-size: 1.1rem; border: 1px solid #555;
        }
        
        #btn-shop {
            position: absolute; top: 15px; right: 20px; background: #f1c40f; color: #000;
            padding: 10px 20px; font-weight: bold; border-radius: 8px; border: 2px solid #d4ac0d;
            pointer-events: auto; cursor: pointer; font-size: 1rem;
        }

        /* Joystick & Aksiyon Butonları */
        #joystick-zone {
            position: absolute; bottom: 30px; left: 40px; width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2); pointer-events: auto;
        }
        #stick {
            position: absolute; top: 40px; left: 40px; width: 60px; height: 60px;
            background: rgba(100, 200, 255, 0.7); border-radius: 50%; pointer-events: none;
        }
        
        #action-zone {
            position: absolute; bottom: 30px; right: 40px; width: 160px; height: 160px; pointer-events: auto;
        }
        .btn-action {
            position: absolute; background: rgba(0, 0, 0, 0.7); border: 3px solid #fff;
            color: #fff; border-radius: 50%; font-weight: bold; display: flex;
            align-items: center; justify-content: center;
        }
        #btn-attack { bottom: 0; left: 0; width: 90px; height: 90px; border-color: #e67e22; font-size: 1.1rem; }
        #btn-skill { top: 0; right: 0; width: 70px; height: 70px; border-color: #00ffff; font-size: 0.9rem; }
        
        #xp-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background: #222; }
        #xp-bar { height: 100%; width: 0%; background: #9b59b6; }
        #level-text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-weight: bold; }
        #respawn-text { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #e74c3c; display: none; }
    </style>
</head>
<body onload="initGame()">

    <div id="portrait-warning">
        <svg viewBox="0 0 24 24"><path d="M16 1H8C6.9 1 6 1.9 6 3v18c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H8V5h8v14z"/></svg>
        <span>Lütfen Telefonunuzu Yan Çevirin</span>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div class="top-bar">Kule: <span id="tower-hp">1500</span> | Altın: <span id="gold">0</span></div>
            <div id="btn-shop" onclick="buyItem()">⚔️ Hasar +10 (50G)</div>
            <div id="level-text">Seviye: <span id="lvl">1</span></div>
            <div id="xp-bar-container"><div id="xp-bar"></div></div>
            <div id="respawn-text">YENİDEN DOĞUYORSUN...</div>

            <div id="joystick-zone"><div id="stick"></div></div>
            <div id="action-zone">
                <div id="btn-attack" class="btn-action">VUR</div>
                <div id="btn-skill" class="btn-action">SKILL</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'START';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(nexus) { nexus.x = canvas.width/2; nexus.y = canvas.height/2; }
        }
        window.addEventListener('resize', resize);

        // Manyak Nişancı statlarını varsayılan yaptık
        let player = { 
            color: '#3498db', maxHp: 300, hp: 300, attackRange: 210, damage: 38, speed: 5.2, 
            skillCooldown: 5, style: 'ranged', radius: 15, level: 1, xp: 0, maxXp: 100, 
            isDead: false, respawnTimer: 0, facingAngle: 0, skillReady: true 
        };

        let nexus = { x: 0, y: 0, hp: 1500, maxHp: 1500, radius: 45 };
        let entities = [], projectiles = [], particles = [], floatingTexts = [], bushes = [];
        let frame = 0, gold = 0;

        function initGame() {
            resize();
            player.x = nexus.x; 
            player.y = nexus.y + 120;
            bushes = [
                { x: canvas.width*0.2, y: canvas.height*0.2, radius: 80 }, 
                { x: canvas.width*0.8, y: canvas.height*0.8, radius: 80 }
            ];
            gameState = 'PLAYING';
            loop(); // Oyun direkt başlıyor
        }

        // --- KONTROLLER ---
        const joyZone = document.getElementById('joystick-zone');
        let joyX = 0, joyY = 0, isMoving = false;

        joyZone.addEventListener('pointerdown', e => { isMoving = true; handleJoy(e); });
        window.addEventListener('pointermove', e => { if(isMoving) handleJoy(e); });
        window.addEventListener('pointerup', () => { 
            isMoving = false; joyX = 0; joyY = 0; 
            document.getElementById('stick').style.transform = 'translate(0,0)'; 
        });

        function handleJoy(e) {
            let rect = joyZone.getBoundingClientRect();
            let dx = e.clientX - (rect.left + 70), dy = e.clientY - (rect.top + 70);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            let angle = Math.atan2(dy, dx);
            document.getElementById('stick').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            joyX = Math.cos(angle)*dist/40; joyY = Math.sin(angle)*dist/40;
            if(dist > 5) player.facingAngle = angle;
        }

        // Saldırı Butonları
        document.getElementById('btn-attack').addEventListener('pointerdown', () => {
            if(player.isDead) return;
            let target = null, minDist = player.attackRange;
            entities.forEach(e => {
                let d = Math.hypot(e.x - player.x, e.y - player.y) - e.radius;
                if(d < minDist) { minDist = d; target = e; }
            });
            if(target) {
                projectiles.push({ x: player.x, y: player.y, target: target, speed: 16, damage: player.damage, type: 'basic' });
                player.facingAngle = Math.atan2(target.y - player.y, target.x - player.x);
            }
        });

        document.getElementById('btn-skill').addEventListener('pointerdown', () => {
            if(player.isDead || !player.skillReady) return;
            projectiles.push({ 
                x: player.x, y: player.y, vx: Math.cos(player.facingAngle)*13, 
                vy: Math.sin(player.facingAngle)*13, damage: player.damage*3, 
                type: 'rocket', life: 75 
            });
            player.skillReady = false;
            document.getElementById('btn-skill').style.opacity = '0.4';
            setTimeout(() => { player.skillReady = true; document.getElementById('btn-skill').style.opacity = '1'; }, 5000);
        });

        function buyItem() { if(gold >= 50) { gold -= 50; player.damage += 12; } }

        function update() {
            if(nexus.hp <= 0) return;
            if(!player.isDead) {
                player.x = Math.max(15, Math.min(canvas.width-15, player.x + joyX * player.speed));
                player.y = Math.max(15, Math.min(canvas.height-15, player.y + joyY * player.speed));
            }

            // Minyon Spawn
            if(frame % 220 === 0) {
                entities.push({ 
                    x: Math.random()*canvas.width, y: -20, radius: 15, 
                    hp: 70+(frame/45), maxHp: 70+(frame/45), speed: 1.6, damage: 6 
                });
            }

            entities.forEach((e, i) => {
                let dx = nexus.x - e.x, dy = nexus.y - e.y, dist = Math.hypot(dx, dy);
                if(dist > 50) { e.x += (dx/dist)*e.speed; e.y += (dy/dist)*e.speed; }
                else if(frame % 40 === 0) nexus.hp -= e.damage;
                if(e.hp <= 0) { 
                    entities.splice(i, 1); 
                    gold += 20; player.xp += 30; 
                    addFloatingText(e.x, e.y, "+20G", "#f1c40f");
                }
            });

            projectiles.forEach((p, i) => {
                if(p.type === 'basic') {
                    if(!entities.includes(p.target)) { projectiles.splice(i,1); return; }
                    let d = Math.hypot(p.target.x - p.x, p.target.y - p.y);
                    if(d < 25) { p.target.hp -= p.damage; projectiles.splice(i, 1); }
                    else { p.x += ((p.target.x-p.x)/d)*p.speed; p.y += ((p.target.y-p.y)/d)*p.speed; }
                } else { 
                    p.x += p.vx; p.y += p.vy; p.life--; 
                    entities.forEach(e => { 
                        if(Math.hypot(e.x-p.x, e.y-p.y) < 35) { e.hp -= p.damage; p.life = 0; } 
                    });
                    if(p.life <= 0) projectiles.splice(i, 1);
                }
            });

            if(player.xp >= player.maxXp) { 
                player.level++; player.xp = 0; player.maxXp *= 1.45; player.damage += 7; 
                addFloatingText(player.x, player.y - 40, "LEVEL UP!", "#fff");
            }

            document.getElementById('tower-hp').innerText = Math.floor(nexus.hp);
            document.getElementById('gold').innerText = gold;
            document.getElementById('lvl').innerText = player.level;
            document.getElementById('xp-bar').style.width = (player.xp/player.maxXp*100)+'%';
            
            floatingTexts.forEach((t, i) => { t.y -= 1; t.life--; if(t.life <= 0) floatingTexts.splice(i, 1); });
            frame++;
        }

        function addFloatingText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 40 }); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bushes.forEach(b => { ctx.fillStyle='rgba(39, 174, 96, 0.15)'; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill(); });
            
            // Üs (Nexus)
            ctx.fillStyle = '#2980b9'; ctx.beginPath(); ctx.arc(nexus.x, nexus.y, nexus.radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#3498db'; ctx.lineWidth = 4; ctx.stroke();

            // Karakter
            if(!player.isDead) {
                ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.facingAngle);
                ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.fillRect(10, -3, 8, 6); ctx.restore();
            }

            entities.forEach(e => { 
                ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill(); 
            });

            projectiles.forEach(p => { 
                ctx.fillStyle = p.type === 'basic' ? '#f1c40f' : '#e74c3c'; 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.type === 'basic' ? 5 : 12, 0, Math.PI*2); ctx.fill(); 
            });

            floatingTexts.forEach(t => { ctx.fillStyle = t.color; ctx.font = "bold 16px Arial"; ctx.fillText(t.text, t.x, t.y); });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
    </script>
</body>
</html>
