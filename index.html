<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Klasik Yılan (Retro Snake)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #1a1a24; 
            color: #ecf0f1;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            /* 100vh yerine 100dvh kullanıyoruz ki Chrome'un alt barı butonları kesmesin */
            height: 100dvh; max-height: 100dvh; 
            overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        /* --- BAŞLANGIÇ MENÜSÜ --- */
        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 36, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 50;
        }
        #start-menu h1 {
            font-size: 40px; color: #39ff14; text-shadow: 0 0 15px rgba(57, 255, 20, 0.7);
            margin-bottom: 10px; letter-spacing: 5px;
        }
        #start-menu p { color: #ccc; margin-bottom: 40px; font-size: 16px; }
        
        .start-btn {
            background-color: #2c3e50; color: #fff; border: 2px solid #39ff14;
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 8px; margin-bottom: 15px; cursor: pointer;
            width: 80%; max-width: 300px; text-align: center;
            box-shadow: 0 4px 0 #151e27; transition: 0.1s;
        }
        .start-btn.primary { background-color: #39ff14; color: #000; box-shadow: 0 4px 0 #28b40e; }
        .start-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Oyun Arayüzü */
        #game-ui {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: space-between;
        }

        #game-header { margin-top: 10px; width: 100%; text-align: center; }
        #game-header h2 { margin: 0; font-size: 22px; color: #39ff14; letter-spacing: 2px; }
        
        #score-board { 
            font-size: 16px; font-weight: bold; margin-top: 5px; 
            background: rgba(255,255,255,0.05); padding: 5px 15px;
            border-radius: 5px; border: 1px solid #333; display: inline-block;
        }
        .highlight { color: #f1c40f; }

        #canvas-container {
            margin-top: auto; margin-bottom: auto;
            padding: 5px; background: #333; border-radius: 5px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }
        canvas { background-color: #0f1c0f; display: block; }

        /* Sanal Konsol */
        #controls {
            display: grid;
            grid-template-columns: 65px 65px 65px;
            grid-template-rows: 65px 65px 65px;
            gap: 12px; margin-bottom: 20px;
        }

        .btn {
            background-color: #2c3e50; border: 2px solid #1a252f;
            border-radius: 12px; color: rgba(255,255,255,0.7);
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #151e27; cursor: pointer;
        }
        .btn:active {
            transform: translateY(6px); box-shadow: none;
            background-color: #39ff14; color: #000; border-color: #39ff14;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* Oyun Sonu Ekranı */
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(10, 10, 15, 0.95);
            padding: 30px; border: 3px solid #ff003c; border-radius: 10px;
            text-align: center; z-index: 60; width: 80%; max-width: 300px;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
        }
        #game-over h2 { color: #ff003c; margin-top: 0; font-size: 26px; }
        #final-score { font-size: 18px; line-height: 1.5; color: #ccc; }
        #restart-btn {
            background-color: #39ff14; color: #000; border: none;
            padding: 15px 20px; font-size: 18px; font-weight: bold;
            border-radius: 5px; margin-top: 20px; cursor: pointer; width: 100%;
        }
        #restart-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1>S N A K E</h1>
        <p>Retro Yılan Macerası</p>
        <button class="start-btn primary" onclick="startGame(true)">📱 TAM EKRAN BAŞLA</button>
        <button class="start-btn" onclick="startGame(false)">NORMAL BAŞLA</button>
    </div>

    <div id="game-ui">
        <div id="game-header">
            <h2>S N A K E</h2>
            <div id="score-board">
                SKOR: <span id="score" style="color:#fff;">0</span> | REKOR: <span id="high-score" class="highlight">0</span>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas" width="320" height="320"></canvas>
        </div>

        <div id="controls">
            <div class="btn" id="btn-up">▲</div>
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
            <div class="btn" id="btn-down">▼</div>
        </div>
    </div>

    <div id="game-over">
        <h2>OYUN BİTTİ</h2>
        <div id="final-score">Skorun: 0</div>
        <button id="restart-btn" onclick="resetGame()">YENİDEN BAŞLA</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const finalScoreElement = document.getElementById('final-score');
        
        // --- OYUN AYARLARI ---
        const grid = 16;
        let gameLoopId;
        let isGameOver = false;
        let isGameRunning = false;
        
        let score = 0;
        let highScore = localStorage.getItem('retroSnakeHighScore') || 0;
        highScoreElement.innerText = highScore;

        let baseSpeed = 10; 
        let currentSpeed = baseSpeed;
        let frameCount = 0;
        let changingDirection = false;

        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        // --- SES MOTORU ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'eat') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'crash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- TAM EKRAN VE BAŞLATMA MANTIĞI ---
        function startGame(fullscreen) {
            initAudio(); // Tarayıcı ses kilidini aç
            
            if (fullscreen) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().then(() => lockPortrait()).catch(err => {});
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                    setTimeout(lockPortrait, 500);
                }
            }

            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            isGameRunning = true;
            placeApple();
            requestAnimationFrame(loop);
        }

        function lockPortrait() {
            // Cihaz destekliyorsa ekranı dikey modda kilitler
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(function(error) {
                    console.log("Ekran kilidi desteklenmiyor.");
                });
            }
        }

        // --- KONTROLLER ---
        function changeDirection(direction) {
            if (changingDirection || !isGameRunning) return;

            if (direction === 'up' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; changingDirection = true; }
            else if (direction === 'down' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; changingDirection = true; }
            else if (direction === 'left' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; changingDirection = true; }
            else if (direction === 'right' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; changingDirection = true; }
        }

        document.getElementById('btn-up').addEventListener('pointerdown', (e) => { e.preventDefault(); changeDirection('up'); });
        document.getElementById('btn-down').addEventListener('pointerdown', (e) => { e.preventDefault(); changeDirection('down'); });
        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); changeDirection('left'); });
        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); changeDirection('right'); });

        document.addEventListener('keydown', function(e) {
            if (e.which === 37) changeDirection('left');
            else if (e.which === 38) changeDirection('up');
            else if (e.which === 39) changeDirection('right');
            else if (e.which === 40) changeDirection('down');
        });

        // --- OYUN DÖNGÜSÜ YARDIMCILARI ---
        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }
        
        function placeApple() {
            apple.x = getRandomInt(0, 20) * grid;
            apple.y = getRandomInt(0, 20) * grid;
            for (let i = 0; i < snake.cells.length; i++) {
                if (apple.x === snake.cells[i].x && apple.y === snake.cells[i].y) {
                    placeApple(); break;
                }
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += grid) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += grid) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        // --- OYUN DÖNGÜSÜ ---
        function loop() {
            if (isGameOver || !isGameRunning) return;
            gameLoopId = requestAnimationFrame(loop);

            if (++frameCount < currentSpeed) return;
            
            frameCount = 0;
            changingDirection = false; 
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid(); 

            snake.x += snake.dx;
            snake.y += snake.dy;

            // Duvara çarpma kontrolü
            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
                gameOver(); return;
            }

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Elma çizimi
            ctx.fillStyle = '#ff003c';
            ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

            // Yılan çizimi
            ctx.fillStyle = '#39ff14';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    scoreElement.innerText = score;
                    playSound('eat');
                    placeApple();
                    
                    if (score % 50 === 0 && currentSpeed > 3) {
                        currentSpeed--;
                    }
                }

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) gameOver();
                }
            });
        }

        function gameOver() {
            isGameOver = true;
            isGameRunning = false;
            playSound('crash');
            cancelAnimationFrame(gameLoopId);
            
            let messageHTML = `Skor: <span style="color:#fff;">${score}</span>`;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('retroSnakeHighScore', highScore);
                highScoreElement.innerText = highScore;
                messageHTML += `<br><br><span style="color:#f1c40f; font-weight:bold;">🏆 YENİ REKOR! 🏆</span>`;
            }

            finalScoreElement.innerHTML = messageHTML;
            document.getElementById('game-over').style.display = 'block';
        }

        window.resetGame = function() {
            snake.x = 160; snake.y = 160;
            snake.cells = []; snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0;
            score = 0; currentSpeed = baseSpeed;
            scoreElement.innerText = score;
            isGameOver = false; isGameRunning = true; changingDirection = false;
            document.getElementById('game-over').style.display = 'none';
            placeApple();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
