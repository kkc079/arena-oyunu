<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan: Temiz Kurulum</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a24; color: #fff;
            font-family: monospace; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
        }
        .btn {
            background-color: #39ff14; color: #000; padding: 20px; font-size: 20px;
            font-weight: bold; border-radius: 10px; border: none; cursor: pointer;
            margin: 10px; width: 80%; max-width: 300px;
        }
        #game-ui, #editor-ui { display: none; }
        canvas { background-color: #000; border: 2px solid #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1 style="color:#39ff14; font-size: 40px;">SNAKE</h1>
        <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
        <button class="btn" style="background:#2c3e50; color:#fff;" onclick="alert('Özel harita menüsü çalışıyor!')">ÖZEL HARİTA YAP</button>
    </div>

    <div id="game-ui">
        <h2>SNAKE OYUNU</h2>
        <canvas id="gameCanvas" width="320" height="320"></canvas>
        <button class="btn" style="background:#e74c3c; margin-top: 20px;" onclick="backToMenu()">MENÜYE DÖN</button>
    </div>

    <script>
        // En basit ve hatasız geçiş sistemi
        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            // Yılan oyununu temsil eden basit bir çizim (Test için)
            const ctx = document.getElementById('gameCanvas').getContext('2d');
            ctx.fillStyle = '#39ff14';
            ctx.fillRect(160, 160, 16, 16);
            ctx.fillStyle = 'red';
            ctx.fillRect(100, 100, 16, 16);
        }

        function backToMenu() {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('start-menu').style.display = 'flex';
        }
    </script>
</body>
</html>
