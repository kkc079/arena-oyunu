<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan: Sürüm 6.1 (Kado)</title>
    <style>
        /* SIFIRDAN TEMİZ VE GÜVENLİ CSS */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #121212; color: #fff;
            font-family: Arial, sans-serif; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .ekran {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background-color: #121212; z-index: 10; padding: 10px; box-sizing: border-box;
        }

        .btn {
            background-color: #39ff14; color: #000; border-radius: 8px;
            padding: 15px 20px; font-size: 18px; font-weight: bold; margin: 8px 0; 
            width: 90%; max-width: 320px; text-align: center; cursor: pointer;
            box-shadow: 0 4px 0 #209907; text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-mavi { background-color: #3498db; color: #fff; box-shadow: 0 4px 0 #1c6ea4; }
        .btn-kirmizi { background-color: #e74c3c; color: #fff; box-shadow: 0 4px 0 #9c2b1f; }

        .kutu-secim { display: flex; gap: 15px; margin: 15px 0; background: #222; padding: 10px; border-radius: 10px; }
        .renk-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .renk-btn.secili { border-color: #fff; transform: scale(1.1); }
        .meyve-btn { font-size: 24px; padding: 5px 10px; cursor: pointer; opacity: 0.4; }
        .meyve-btn.secili { opacity: 1; border-bottom: 2px solid #39ff14; }

        canvas { background-color: #050a05; border: 3px solid #333; border-radius: 5px; touch-action: none; max-width: 95vw; display: block; margin: 0 auto; }
        .ust-bilgi { display: flex; justify-content: space-between; width: 100%; max-width: 288px; margin-bottom: 10px; font-weight: bold; font-size: 16px;}
        #buffYazi { color: #f1c40f; text-shadow: 1px 1px 2px #000; }

        .yon-paneli { display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; gap: 10px; margin-top: 15px; touch-action: none; }
        .yon-btn {
            background-color: #333; color: #fff; font-size: 30px; border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 0 #111;
        }
        .yon-btn:active { background-color: #39ff14; color: #000; transform: translateY(5px); box-shadow: none; }
        #btn-yukari { grid-column: 2; grid-row: 1; }
        #btn-sola { grid-column: 1; grid-row: 2; }
        #btn-saga { grid-column: 3; grid-row: 2; }
        #btn-asagi { grid-column: 2; grid-row: 3; }

        #surum { position: fixed; bottom: 5px; right: 5px; color: #555; font-size: 12px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <script>
        window.onerror = function(msg, url, line) {
            alert("Sistem Hatası: " + msg + " (Satır: " + line + "). Lütfen sayfayı yenileyin.");
        };
    </script>

    <div id="ekran-menu" class="ekran" style="display: flex;">
        <h1 style="color: #39ff14; font-size: 50px; margin: 0 0 10px 0; font-family: monospace;">SNAKE</h1>
        <p style="color: #aaa; margin: 0;">Yılan Rengini Seç</p>
        
        <div class="kutu-secim">
            <div class="renk-btn secili" style="background: #39ff14;" onclick="renkSec(this, '#39ff14')"></div>
            <div class="renk-btn" style="background: #3498db;" onclick="renkSec(this, '#3498db')"></div>
            <div class="renk-btn" style="background: #f1c40f;" onclick="renkSec(this, '#f1c40f')"></div>
            <div class="renk-btn" style="background: #e74c3c;" onclick="renkSec(this, '#e74c3c')"></div>
        </div>

        <div class="btn" onclick="oyunuBaslat(false)">▶ OYUNA BAŞLA</div>
        <div class="btn btn-mavi" onclick="ekranGecis('ekran-editor')">🛠️ ÖZEL HARİTA YAP</div>
        <div class="btn btn-kirmizi" onclick="kadoModuBaslat()">👑 KADO MODU 👑</div>
    </div>

    <div id="ekran-editor" class="ekran">
        <h2 style="color: #3498db; margin: 0 0 5px 0;">HARİTA YAPICI</h2>
        <p style="font-size: 12px; color: #888; margin: 0 0 10px 0;">Ekrana dokunup sürükleyerek boya</p>
        
        <div style="background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: 90%; max-width: 320px;">
            <div class="kutu-secim" style="margin: 0 0 10px 0; padding: 0; background: transparent; justify-content: space-around;">
                <div class="meyve-btn secili" onclick="meyveSec(this, 'normal')">🍎</div>
                <div class="meyve-btn" onclick="meyveSec(this, 'hiz')">⚡</div>
                <div class="meyve-btn" onclick="meyveSec(this, 'yavas')">❄️</div>
                <div class="meyve-btn" onclick="meyveSec(this, 'zehir')">☠️</div>
            </div>
            
            <div style="display: flex; justify-content: space-between; gap: 10px;">
                <div class="btn btn-mavi" style="margin:0; padding:10px; font-size:14px; flex:1;" onclick="editorDoldur()">Doldur</div>
                <div class="btn btn-kirmizi" style="margin:0; padding:10px; font-size:14px; flex:1;" onclick="editorTemizle()">Temizle</div>
            </div>
        </div>

        <canvas id="canvasEditor" width="288" height="288"></canvas>

        <div class="btn" style="margin-top: 15px;" onclick="oyunuBaslat(true)">▶ HARİTAYI OYNA</div>
        <div class="btn btn-mavi" onclick="ekranGecis('ekran-menu')">ANA MENÜ</div>
    </div>

    <div id="ekran-oyun" class="ekran">
        <div class="ust-bilgi">
            <span>Skor: <span id="skorYazi" style="color: #fff;">0</span></span>
            <span id="buffYazi"></span>
            <span>Rekor: <span id="rekorYazi" style="color: #f1c40f;">0</span></span>
        </div>

        <canvas id="canvasOyun" width="288" height="288"></canvas>

        <div class="yon-paneli">
            <div id="btn-yukari" class="yon-btn" ontouchstart="yonVer('yukari', event)" onmousedown="yonVer('yukari', event)">▲</div>
            <div id="btn-sola" class="yon-btn" ontouchstart="yonVer('sola', event)" onmousedown="yonVer('sola', event)">◀</div>
            <div id="btn-saga" class="yon-btn" ontouchstart="yonVer('saga', event)" onmousedown="yonVer('saga', event)">▶</div>
            <div id="btn-asagi" class="yon-btn" ontouchstart="yonVer('asagi', event)" onmousedown="yonVer('asagi', event)">▼</div>
        </div>
    </div>

    <div id="ekran-oyun-sonu" class="ekran" style="background: rgba(0,0,0,0.9); z-index: 20;">
        <h1 style="color: #e74c3c; font-size: 40px; margin-bottom: 10px;">OYUN BİTTİ</h1>
        <p style="font-size: 20px; margin-bottom: 30px;">Skorun: <span id="sonSkor" style="color:#fff; font-weight:bold;">0</span></p>
        <div class="btn" onclick="oyunuBaslat(gecerliOzelMod)">TEKRAR DENE</div>
        <div class="btn btn-mavi" onclick="ekranGecis('ekran-menu')">ANA MENÜ</div>
    </div>

    <div id="surum">Sürüm 6.1</div>

    <script>
        // -- DEĞİŞKENLER --
        var canvasE = document.getElementById('canvasEditor');
        var ctxE = canvasE.getContext('2d');
        var canvasO = document.getElementById('canvasOyun');
        var ctxO = canvasO.getContext('2d');

        var hucre = 16;
        var boyut = 18; 
        
        var yilanRengi = '#39ff14';
        var editorMeyve = 'normal';
        var gecerliOzelMod = false;

        var yilan = { x: 0, y: 0, dx: hucre, dy: 0, kuyruk: [], uzunluk: 4 };
        var meyveler = [];
        var haritaMeyveleri = []; 

        var skor = 0; var rekor = 0;
        var tabanHiz = 10; var hiz = 10; var sayac = 0;
        var yonKilit = false; var buffSuresi = 0;
        var oyunDongusu; var oyunAktif = false;

        try {
            rekor = localStorage.getItem('yilanRekorV61') || 0;
            document.getElementById('rekorYazi').innerText = rekor;
        } catch(e) {}

        // -- EKSİK OLAN KADO MODU FONKSİYONU BURADA --
        function kadoModuBaslat() {
            haritaMeyveleri = [];
            boyut = 18;
            var h = hucre;
            function ekle(c, r) { haritaMeyveleri.push({x: c*h, y: r*h, tip: 'normal'}); }

            // O
            [2,3,4,5].forEach(c => { ekle(c,2); ekle(c,8); });
            [3,4,5,6,7].forEach(r => { ekle(2,r); ekle(5,r); });
            // C
            [10,11,12,13,14].forEach(c => { ekle(c,2); ekle(c,8); });
            [3,4,5,6,7].forEach(r => { ekle(10,r); });
            // K
            [11,12,13,14,15,16].forEach(r => { ekle(1,r); });
            ekle(4,11); ekle(3,12); ekle(2,13); ekle(2,14); ekle(3,15); ekle(4,16);
            // A
            ekle(6,11); ekle(6,14);
            [12,13,14,15,16].forEach(r => { ekle(5,r); ekle(7,r); });
            // D
            [11,12,13,14,15,16].forEach(r => { ekle(9,r); });
            ekle(10,11); ekle(11,11); ekle(10,16); ekle(11,16);
            [12,13,14,15].forEach(r => { ekle(12,r); });
            // O (Alt)
            [14,15,16].forEach(c => { ekle(c,11); ekle(c,16); });
            [12,13,14,15].forEach(r => { ekle(14,r); ekle(16,r); });

            oyunuBaslat(true);
        }

        // -- MENÜ FONKSİYONLARI --
        function ekranGecis(hedefEkran) {
            document.getElementById('ekran-menu').style.display = 'none';
            document.getElementById('ekran-editor').style.display = 'none';
            document.getElementById('ekran-oyun').style.display = 'none';
            document.getElementById('ekran-oyun-sonu').style.display = 'none';
            
            document.getElementById(hedefEkran).style.display = 'flex';
            oyunAktif = false;
            cancelAnimationFrame(oyunDongusu);

            if (hedefEkran === 'ekran-editor') {
                haritaMeyveleri = haritaMeyveleri.filter(m => m.x < canvasE.width && m.y < canvasE.height);
                editorCiz();
            }
        }

        function renkSec(el, renk) {
            document.querySelectorAll('.renk-btn').forEach(b => b.classList.remove('secili'));
            el.classList.add('secili');
            yilanRengi = renk;
        }

        function meyveSec(el, tip) {
            document.querySelectorAll('.meyve-btn').forEach(b => b.classList.remove('secili'));
            el.classList.add('secili');
            editorMeyve = tip;
        }

        // -- EDİTÖR FONKSİYONLARI --
        function editorDoldur() {
            haritaMeyveleri = [];
            var merkez = Math.floor(boyut/2) * hucre;
            for(var r=0; r<boyut; r++) {
                for(var c=0; c<boyut; c++) {
                    var hx = c*hucre; var hy = r*hucre;
                    if(hx !== merkez || hy !== merkez) haritaMeyveleri.push({x: hx, y: hy, tip: editorMeyve});
                }
            }
            editorCiz();
        }

        function editorTemizle() { haritaMeyveleri = []; editorCiz(); }

        var cizimVar = false; var siliyorMu = false;
        canvasE.onmousedown = function(e) { cizimVar = true; editorIslem(e, true); };
        canvasE.onmousemove = function(e) { if(cizimVar) editorIslem(e, false); };
        window.onmouseup = function() { cizimVar = false; };
        
        canvasE.ontouchstart = function(e) { e.preventDefault(); cizimVar = true; editorIslem(e.touches[0], true); };
        canvasE.ontouchmove = function(e) { e.preventDefault(); if(cizimVar) editorIslem(e.touches[0], false); };
        window.ontouchend = function() { cizimVar = false; };

        function editorIslem(e, ilk) {
            var rect = canvasE.getBoundingClientRect();
            var x = Math.floor((e.clientX - rect.left)/hucre) * hucre;
            var y = Math.floor((e.clientY - rect.top)/hucre) * hucre;
            
            if(x < 0 || x >= canvasE.width || y < 0 || y >= canvasE.height) return;
            if(x === Math.floor(boyut/2)*hucre && y === Math.floor(boyut/2)*hucre) return;

            var i = haritaMeyveleri.findIndex(m => m.x === x && m.y === y);
            if(ilk) siliyorMu = (i > -1);

            if(siliyorMu && i > -1) haritaMeyveleri.splice(i, 1);
            else if(!siliyorMu && i === -1) haritaMeyveleri.push({x: x, y: y, tip: editorMeyve});
            editorCiz();
        }

        function editorCiz() {
            ctxE.clearRect(0,0,canvasE.width,canvasE.height);
            izgaraCiz(ctxE, canvasE);
            haritaMeyveleri.forEach(m => cizSekil(ctxE, m.x, m.y, m.tip));
            ctxE.fillStyle = yilanRengi; ctxE.globalAlpha = 0.5;
            ctxE.fillRect(Math.floor(boyut/2)*hucre, Math.floor(boyut/2)*hucre, hucre-1, hucre-1);
            ctxE.globalAlpha = 1.0;
        }

        // -- OYUN MEKANİKLERİ --
        function oyunuBaslat(ozelMi) {
            gecerliOzelMod = ozelMi;
            ekranGecis('ekran-oyun');
            
            if(!ozelMi) boyut = 18; 
            cOyun.width = boyut * hucre; cOyun.height = boyut * hucre;

            yilan.x = Math.floor(boyut/2) * hucre; yilan.y = Math.floor(boyut/2) * hucre;
            yilan.kuyruk = []; yilan.uzunluk = 4; yilan.dx = hucre; yilan.dy = 0;
            
            skor = 0; document.getElementById('skorYazi').innerText = skor;
            tabanHiz = 10; hiz = tabanHiz; buffSuresi = 0; document.getElementById('buffYazi').innerText = "";
            yonKilit = false;
            
            if(ozelMi) {
                meyveler = [];
                for(var i=0; i<haritaMeyveleri.length; i++) {
                    meyveler.push({x: haritaMeyveleri[i].x, y: haritaMeyveleri[i].y, tip: haritaMeyveleri[i].tip, sure: null});
                }
                if(meyveler.length === 0) rasgeleMeyve('normal');
            } else {
                meyveler = []; rasgeleMeyve('normal');
            }

            oyunAktif = true;
            animasyonId = requestAnimationFrame(motor);
        }

        function rasgeleMeyve(tip) {
            if(yilan.kuyruk.length + meyveler.length >= boyut * boyut) return;
            var bitti = false;
            while(!bitti) {
                var rx = Math.floor(Math.random() * boyut) * hucre;
                var ry = Math.floor(Math.random() * boyut) * hucre;
                var carpis = yilan.kuyruk.some(k => k.x === rx && k.y === ry) || meyveler.some(m => m.x === rx && m.y === ry) || (yilan.x === rx && yilan.y === ry);
                if(!carpis) {
                    meyveler.push({x: rx, y: ry, tip: tip, sure: (tip !== 'normal' ? 150 : null)});
                    bitti = true;
                }
            }
        }

        function yonVer(yon, e) {
            if(e) e.preventDefault();
            if(yonKilit || !oyunAktif) return;
            if(yon === 'yukari' && yilan.dy === 0) { yilan.dy = -hucre; yilan.dx = 0; yonKilit = true; }
            else if(yon === 'asagi' && yilan.dy === 0) { yilan.dy = hucre; yilan.dx = 0; yonKilit = true; }
            else if(yon === 'sola' && yilan.dx === 0) { yilan.dx = -hucre; yilan.dy = 0; yonKilit = true; }
            else if(yon === 'saga' && yilan.dx === 0) { yilan.dx = hucre; yilan.dy = 0; yonKilit = true; }
        }

        document.onkeydown = function(e) {
            if(!oyunAktif) return;
            if(e.key === 'ArrowUp' || e.key === 'w') yonVer('yukari');
            if(e.key === 'ArrowDown' || e.key === 's') yonVer('asagi');
            if(e.key === 'ArrowLeft' || e.key === 'a') yonVer('sola');
            if(e.key === 'ArrowRight' || e.key === 'd') yonVer('saga');
        };

        function izgaraCiz(hedefCtx, c) {
            hedefCtx.strokeStyle = '#222'; hedefCtx.lineWidth = 1;
            for(var x=0; x<=c.width; x+=hucre) { hedefCtx.beginPath(); hedefCtx.moveTo(x,0); hedefCtx.lineTo(x,c.height); hedefCtx.stroke(); }
            for(var y=0; y<=c.height; y+=hucre) { hedefCtx.beginPath(); hedefCtx.moveTo(0,y); hedefCtx.lineTo(c.width,y); hedefCtx.stroke(); }
        }

        function cizSekil(hedefCtx, x, y, tip, sure) {
            if(tip === 'normal') hedefCtx.fillStyle = '#e74c3c';
            else if(tip === 'hiz') hedefCtx.fillStyle = '#f39c12';
            else if(tip === 'yavas') hedefCtx.fillStyle = '#3498db';
            else if(tip === 'zehir') hedefCtx.fillStyle = '#9b59b6';
            
            if(sure && sure < 30 && sure % 4 < 2) hedefCtx.fillStyle = 'transparent';
            hedefCtx.fillRect(x, y, hucre-1, hucre-1);
        }

        function motor() {
            if(!oyunAktif) return;
            animasyonId = requestAnimationFrame(motor);

            if(buffSuresi > 0) {
                buffSuresi--;
                if(buffSuresi <= 0) { hiz = tabanHiz; document.getElementById('buffYazi').innerText = ""; }
            }

            if(++sayac < hiz) return;
            sayac = 0; yonKilit = false;

            ctxO.clearRect(0,0,canvasO.width,canvasO.height); izgaraCiz(ctxO, canvasO);
            
            yilan.x += yilan.dx; yilan.y += yilan.dy;

            // Duvar
            if(yilan.x < 0 || yilan.x >= canvasO.width || yilan.y < 0 || yilan.y >= canvasO.height) { oyunuKapat(); return; }

            yilan.kuyruk.unshift({x: yilan.x, y: yilan.y});
            if(yilan.kuyruk.length > yilan.uzunluk) yilan.kuyruk.pop();

            // Meyveler
            for(var i = meyveler.length - 1; i >= 0; i--) {
                var m = meyveler[i];
                cizSekil(ctxO, m.x, m.y, m.tip, m.sure);
                if(m.sure !== null) { m.sure--; if(m.sure <= 0) meyveler.splice(i, 1); }
            }

            // Yılan
            ctxO.fillStyle = yilanRengi;
            for(var i=0; i<yilan.kuyruk.length; i++) {
                var hObj = yilan.kuyruk[i];
                ctxO.fillRect(hObj.x, hObj.y, hucre-1, hucre-1);

                // Yeme Olayı
                for(var j=0; j<meyveler.length; j++) {
                    if(hObj.x === meyveler[j].x && hObj.y === meyveler[j].y) {
                        var yenen = meyveler.splice(j,1)[0];
                        var bYazi = document.getElementById('buffYazi');
                        
                        if(yenen.tip === 'normal') {
                            skor += 10; yilan.uzunluk++;
                            if(skor % 50 === 0 && tabanHiz > 3) tabanHiz--;
                            if(buffSuresi <= 0) hiz = tabanHiz;
                            if(!gecerliOzelMod && Math.random() < 0.3) {
                                var tipler = ['hiz','yavas','zehir'];
                                rasgeleMeyve(tipler[Math.floor(Math.random()*3)]);
                            }
                        } else if(yenen.tip === 'hiz') {
                            skor += 20; buffSuresi = 100; hiz = 4;
                            bYazi.innerText = "HIZLANDIN!"; bYazi.style.color = "#f39c12";
                        } else if(yenen.tip === 'yavas') {
                            skor += 10; buffSuresi = 100; hiz = 15;
                            bYazi.innerText = "YAVAŞLADIN!"; bYazi.style.color = "#3498db";
                        } else if(yenen.tip === 'zehir') {
                            skor -= 15; yilan.uzunluk = Math.max(4, yilan.uzunluk - 2);
                            while(yilan.kuyruk.length > yilan.uzunluk) yilan.kuyruk.pop();
                            bYazi.innerText = "ZEHİRLENDİN!"; bYazi.style.color = "#9b59b6";
                            setTimeout(function(){ if(buffSuresi<=0) bYazi.innerText=""; }, 1500);
                        }
                        document.getElementById('skorYazi').innerText = skor;
                        break;
                    }
                }

                // Çarpışma
                if(i > 0 && hObj.x === yilan.x && hObj.y === yilan.y) o
