<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Survivor Pro</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --primary: #e94560;
            --secondary: #43dde6;
            --text: #ffffff;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas { display: block; }

        /* Menü Tasarımları */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .hidden { display: none !important; }

        h1 { font-size: 3rem; margin-bottom: 20px; color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }
        h2 { color: var(--primary); }

        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-start { background: var(--primary); color: white; }
        .btn-settings { background: #4e4e6a; color: white; }
        .btn-back { background: transparent; border: 2px solid var(--secondary); color: var(--secondary); }
        button:active { transform: scale(0.95); }

        /* Ayarlar */
        .setting-item { margin: 20px 0; text-align: left; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--secondary); }

        /* Zorluk Seçimi */
        .difficulty-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn {
            flex: 1; padding: 10px; font-size: 0.9rem; background: #30304a; color: #888;
        }
        .diff-btn.active { background: var(--secondary); color: #000; }

        /* Oyun İçi UI */
        #score-ui {
            position: absolute; top: 20px; left: 20px; font-size: 1.5rem;
            font-weight: bold; pointer-events: none; z-index: 5;
        }

        /* Joystick */
        #joystick-zone {
            display: none; position: absolute; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2); z-index: 10; pointer-events: none;
        }
        #stick {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background: var(--secondary); opacity: 0.6; border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="score-ui" class="hidden">Skor: <span id="current-score">0</span></div>

    <div id="main-menu" class="overlay">
        <h1>ARENA</h1>
        <div class="menu-card">
            <label>Zorluk Seçin</label>
            <div class="difficulty-container">
                <button class="diff-btn" onclick="setDifficulty('easy', this)">Kolay</button>
                <button class="diff-btn active" onclick="setDifficulty('medium', this)">Orta</button>
                <button class="diff-btn" onclick="setDifficulty('hard', this)">Zor</button>
            </div>
            <button class="btn-start" onclick="startGame()">OYUNU BAŞLAT</button>
            <button class="btn-settings" onclick="showScreen('settings-menu')">AYARLAR</button>
        </div>
    </div>

    <div id="settings-menu" class="overlay hidden">
        <h2>AYARLAR</h2>
        <div class="menu-card">
            <div class="setting-item">
                <label>Konsol Hassasiyeti: <span id="sens-val">50</span></label>
                <input type="range" id="sens-input" min="1" max="100" value="50" oninput="updateSens(this.value)">
            </div>
            <button class="btn-back" onclick="showScreen('main-menu')">GERİ DÖN</button>
        </div>
    </div>

    <div id="game-over" class="overlay hidden">
        <h2>ELENDİN!</h2>
        <div class="menu-card">
            <p style="font-size: 1.2rem;">Skorun: <span id="final-score" style="color: var(--secondary); font-weight: bold;">0</span></p>
            <button class="btn-start" onclick="startGame()">TEKRAR DENE</button>
            <button class="btn-back" onclick="showScreen('main-menu')">ANA MENÜ</button>
        </div>
    </div>

    <div id="joystick-zone"><div id="stick"></div></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elementler
        const screens = ['main-menu', 'settings-menu', 'game-over'];
        const scoreUI = document.getElementById('score-ui');
        const currentScoreText = document.getElementById('current-score');
        const finalScoreText = document.getElementById('final-score');
        const joystickZone = document.getElementById('joystick-zone');
        const stick = document.getElementById('stick');

        // Ayarlar ve Değişkenler
        let gameState = 'MENU';
        let sensitivity = 0.5; // 50 / 100
        let difficulty = 'medium';
        let joyX = 0, joyY = 0;
        let isTouching = false;
        let joyOriginX = 0, joyOriginY = 0;
        const maxStickDist = 35;

        // Oyun Objeleri
        let player = { x: 0, y: 0, radius: 15, baseSpeed: 5 };
        let enemies = [];
        let score = 0;
        let frameCount = 0;
        let spawnRate = 100;
        let enemyBaseSpeed = 1;

        // --- EKRAN YÖNETİMİ ---
        function showScreen(screenId) {
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            if(screenId) document.getElementById(screenId).classList.remove('hidden');
            scoreUI.classList.add('hidden');
            gameState = 'MENU';
        }

        function updateSens(val) {
            document.getElementById('sens-val').innerText = val;
            sensitivity = val / 100;
        }

        function setDifficulty(lvl, btn) {
            difficulty = lvl;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- OYUN BAŞLATMA ---
        function startGame() {
            showScreen(null); // Tüm menüleri gizle
            scoreUI.classList.remove('hidden');
            gameState = 'PLAYING';
            
            // Başlangıç değerlerini sıfırla
            score = 0;
            currentScoreText.innerText = "0";
            frameCount = 0;
            enemies = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;

            // Zorluk ayarlarını uygula
            if(difficulty === 'easy') { spawnRate = 140; enemyBaseSpeed = 0.6; }
            else if(difficulty === 'medium') { spawnRate = 90; enemyBaseSpeed = 1.1; }
            else { spawnRate = 50; enemyBaseSpeed = 1.8; }

            requestAnimationFrame(gameLoop);
        }

        // --- KONTROLLER ---
        canvas.addEventListener('touchstart', e => {
            if(gameState !== 'PLAYING') return;
            const t = e.touches[0];
            isTouching = true;
            joyOriginX = t.clientX;
            joyOriginY = t.clientY;
            joystickZone.style.display = 'block';
            joystickZone.style.left = (joyOriginX - 60) + 'px';
            joystickZone.style.top = (joyOriginY - 60) + 'px';
        });

        canvas.addEventListener('touchmove', e => {
            if(!isTouching || gameState !== 'PLAYING') return;
            const t = e.touches[0];
            const dx = t.clientX - joyOriginX;
            const dy = t.clientY - joyOriginY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxStickDist);
            const angle = Math.atan2(dy, dx);
            
            const sx = Math.cos(angle) * dist;
            const sy = Math.sin(angle) * dist;
            stick.style.transform = `translate(${sx}px, ${sy}px)`;
            
            // Hassasiyet burada devreye giriyor
            joyX = (sx / maxStickDist) * (sensitivity * 2);
            joyY = (sy / maxStickDist) * (sensitivity * 2);
        });

        canvas.addEventListener('touchend', () => {
            isTouching = false;
            joyX = 0; joyY = 0;
            joystickZone.style.display = 'none';
        });

        // --- OYUN DÖNGÜSÜ ---
        function spawnEnemy() {
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }
            enemies.push({ x, y, radius: 8, speed: enemyBaseSpeed + Math.random() * 0.5 });
        }

        function gameLoop() {
            if(gameState !== 'PLAYING') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Oyuncu hareketi
            player.x += joyX * player.baseSpeed;
            player.y += joyY * player.baseSpeed;

            // Sınır kontrolü
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Oyuncuyu çiz
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fillStyle = '#43dde6';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Düşmanları güncelle ve çiz
            for(let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let d = Math.sqrt(dx*dx + dy*dy);

                e.x += (dx/d) * e.speed;
                e.y += (dy/d) * e.speed;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = '#ff2e63';
                ctx.fill();

                // Çarpışma
                if(d < player.radius + e.radius - 2) {
                    endGame();
                }
            }

            frameCount++;
            if(frameCount % 60 === 0) {
                score++;
                currentScoreText.innerText = score;
                if(score % 5 === 0) {
                    enemyBaseSpeed += 0.1;
                    if(spawnRate > 20) spawnRate -= 2;
                }
            }
            if(frameCount % spawnRate === 0) spawnEnemy();

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState = 'GAMEOVER';
            joystickZone.style.display = 'none';
            finalScoreText.innerText = score;
            document.getElementById('game-over').classList.remove('hidden');
        }

        // Ekran boyutlandırma
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
</html>
