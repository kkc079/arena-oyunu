<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan: Yeniden Doğuş</title>
    <style>
        /* SIFIRDAN TEMİZ CSS */
        body {
            margin: 0; padding: 0;
            background-color: #121212; color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            /* touch-action body'de YOK, tuşların basmasını engellemeyecek */
        }

        .ekran {
            display: none; /* Ekranlar arası geçiş için */
            flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 10px; box-sizing: border-box;
        }

        .aktif-ekran { display: flex; }

        /* Butonlar */
        .buton {
            background-color: #39ff14; color: #000;
            border: none; border-radius: 10px;
            padding: 15px 20px; font-size: 18px; font-weight: bold;
            margin: 10px 0; width: 90%; max-width: 300px;
            cursor: pointer; text-align: center;
            box-shadow: 0 5px 0 #209907;
        }
        .buton:active { transform: translateY(5px); box-shadow: none; }
        .buton-mavi { background-color: #3498db; box-shadow: 0 5px 0 #1c6ea4; color: #fff;}
        .buton-kirmizi { background-color: #e74c3c; box-shadow: 0 5px 0 #9c2b1f; color: #fff;}

        /* Renk ve Meyve Seçiciler */
        .secici-kutu { display: flex; gap: 10px; margin: 15px 0; background: #222; padding: 10px; border-radius: 10px; }
        .renk-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .renk-btn.secili { border-color: #fff; transform: scale(1.1); }
        
        .meyve-btn { font-size: 24px; padding: 5px 10px; cursor: pointer; opacity: 0.4; border-bottom: 2px solid transparent; }
        .meyve-btn.secili { opacity: 1; border-color: #39ff14; }

        /* Oyun Alanı */
        .oyun-baslik { display: flex; justify-content: space-between; width: 100%; max-width: 350px; margin-bottom: 10px; font-size: 18px; font-weight: bold;}
        #canvas-kutu {
            background-color: #000; border: 3px solid #444; border-radius: 5px;
            touch-action: none; /* Sadece oyun alanında kaydırma iptal */
        }
        canvas { display: block; background: transparent; }

        /* Yön Tuşları */
        .yon-tuslari {
            display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px;
            gap: 10px; margin-top: 15px; touch-action: none;
        }
        .yon-btn {
            background-color: #333; color: #fff; font-size: 30px;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: pointer; box-shadow: 0 5px 0 #111;
        }
        .yon-btn:active { background-color: #39ff14; color: #000; transform: translateY(5px); box-shadow: none; }
        #yukari { grid-column: 2; grid-row: 1; }
        #sola { grid-column: 1; grid-row: 2; }
        #saga { grid-column: 3; grid-row: 2; }
        #asagi { grid-column: 2; grid-row: 3; }

        /* Uyarılar */
        #buff-yazisi { color: #f1c40f; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <div id="ekran-menu" class="ekran aktif-ekran">
        <h1 style="color: #39ff14; font-size: 50px; margin: 0 0 20px 0;">SNAKE</h1>
        
        <p style="margin-bottom: 5px; color: #ccc;">Yılan Rengi Seç:</p>
        <div class="secici-kutu">
            <div class="renk-btn secili" style="background: #39ff14;" onclick="renkSec(this, '#39ff14')"></div>
            <div class="renk-btn" style="background: #3498db;" onclick="renkSec(this, '#3498db')"></div>
            <div class="renk-btn" style="background: #f1c40f;" onclick="renkSec(this, '#f1c40f')"></div>
            <div class="renk-btn" style="background: #e74c3c;" onclick="renkSec(this, '#e74c3c')"></div>
        </div>

        <button class="buton" onclick="oyunuBaslat(false)">OYUNA BAŞLA</button>
        <button class="buton buton-mavi" onclick="ekranGoster('ekran-editor')">ÖZEL HARİTA YAP</button>
    </div>

    <div id="ekran-editor" class="ekran">
        <h2 style="color: #3498db; margin: 0 0 10px 0;">HARİTA YAPICI</h2>
        
        <div class="secici-kutu" style="margin-top: 0;">
            <div class="meyve-btn secili" onclick="meyveSec(this, 'normal')">🍎</div>
            <div class="meyve-btn" onclick="meyveSec(this, 'speed')">⚡</div>
            <div class="meyve-btn" onclick="meyveSec(this, 'slow')">❄️</div>
            <div class="meyve-btn" onclick="meyveSec(this, 'poison')">☠️</div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            Boyut: 
            <input type="range" id="ayar-boyut" min="10" max="25" value="18" oninput="boyutDegistir()">
            <span id="boyut-gosterge">18x18</span>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="buton" style="padding: 10px; margin: 0;" onclick="editorDoldur()">Doldur</button>
            <button class="buton buton-kirmizi" style="padding: 10px; margin: 0;" onclick="editorTemizle()">Temizle</button>
        </div>

        <div id="editor-canvas-yeri"></div>
        <p style="font-size: 12px; color: #888;">Ekrana tıklayarak veya sürükleyerek meyve ekle/sil.</p>

        <button class="buton" onclick="oyunuBaslat(true)">BU HARİTAYI OYNA</button>
        <button class="buton buton-mavi" onclick="ekranGoster('ekran-menu')">ANA MENÜ</button>
    </div>

    <div id="ekran-oyun" class="ekran">
        <div class="oyun-baslik">
            <span>Skor: <span id="skor-yazi">0</span></span>
            <span id="buff-yazisi"></span>
            <span>Rekor: <span id="rekor-yazi" style="color: #f1c40f;">0</span></span>
        </div>

        <div id="oyun-canvas-yeri" id="canvas-kutu"></div>

        <div class="yon-tuslari">
            <div id="yukari" class="yon-btn">▲</div>
            <div id="sola" class="yon-btn">◀</div>
            <div id="saga" class="yon-btn">▶</div>
            <div id="asagi" class="yon-btn">▼</div>
        </div>
        
        <div id="oyun-sonu-menu" style="display: none; flex-direction: column; position: absolute; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; text-align: center;">
            <h2 style="color: #e74c3c;">OYUN BİTTİ</h2>
            <button class="buton" onclick="oyunuBaslat(gecerliModOzelMi)">TEKRAR DENE</button>
            <button class="buton buton-mavi" onclick="ekranGoster('ekran-menu')">ANA MENÜ</button>
        </div>
    </div>

    <script>
        // --- TEMEL DEĞİŞKENLER ---
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const hucreBoyutu = 16;
        let hucreSayisi = 18; // Hem en hem boy
        
        let seciliYilanRengi = '#39ff14';
        let seciliMeyveTipi = 'normal';
        let gecerliModOzelMi = false;

        let oyunDongusu;
        let oyunDevamEdiyor = false;
        
        // Yılan ve Meyveler
        let yilan = { x: 0, y: 0, dx: hucreBoyutu, dy: 0, kuyruk: [], uzunluk: 4 };
        let elmalar = []; // Oyundaki meyveler
        let ozelHaritaElmalari = []; // Editördeki meyveler

        // Skor ve Hız
        let skor = 0;
        let rekor = 0;
        let tabanHiz = 10;
        let gecerliHiz = 10;
        let cerceveSayaci = 0;
        let yonDegistiMi = false;
        let aktifBuff = null;
        let buffSuresi = 0;

        // Rekoru Yükle (Güvenli)
        try {
            rekor = localStorage.getItem('yilanRekorSifir') || 0;
            document.getElementById('rekor-yazi').innerText = rekor;
        } catch(e) { console.log("Hafıza engellendi."); }


        // --- MENÜ VE ARAYÜZ FONKSİYONLARI ---
        function ekranGoster(ekranID) {
            document.getElementById('ekran-menu').classList.remove('aktif-ekran');
            document.getElementById('ekran-editor').classList.remove('aktif-ekran');
            document.getElementById('ekran-oyun').classList.remove('aktif-ekran');
            
            document.getElementById(ekranID).classList.add('aktif-ekran');
            document.getElementById('oyun-sonu-menu').style.display = 'none';

            if (ekranID === 'ekran-editor') {
                document.getElementById('editor-canvas-yeri').appendChild(canvas);
                canvasMuncelle();
                editorCiz();
            }
        }

        function renkSec(element, renkKodu) {
            document.querySelectorAll('.renk-btn').forEach(btn => btn.classList.remove('secili'));
            element.classList.add('secili');
            seciliYilanRengi = renkKodu;
        }

        function meyveSec(element, tip) {
            document.querySelectorAll('.meyve-btn').forEach(btn => btn.classList.remove('secili'));
            element.classList.add('secili');
            seciliMeyveTipi = tip;
        }


        // --- HARİTA EDİTÖRÜ FONKSİYONLARI ---
        function boyutDegistir() {
            hucreSayisi = parseInt(document.getElementById('ayar-boyut').value);
            document.getElementById('boyut-gosterge').innerText = hucreSayisi + "x" + hucreSayisi;
            canvasMuncelle();
            
            // Harita küçüldüyse dışarıda kalan elmaları sil
            ozelHaritaElmalari = ozelHaritaElmalari.filter(e => e.x < canvas.width && e.y < canvas.height);
            editorCiz();
        }

        function canvasMuncelle() {
            canvas.width = hucreSayisi * hucreBoyutu;
            canvas.height = hucreSayisi * hucreBoyutu;
        }

        function editorDoldur() {
            ozelHaritaElmalari = [];
            let merkezX = Math.floor(hucreSayisi / 2) * hucreBoyutu;
            let merkezY = Math.floor(hucreSayisi / 2) * hucreBoyutu;
            
            for (let r = 0; r < hucreSayisi; r++) {
                for (let c = 0; c < hucreSayisi; c++) {
                    let x = c * hucreBoyutu;
                    let y = r * hucreBoyutu;
                    if (x !== merkezX || y !== merkezY) { // Yılanın doğduğu yer boş kalsın
                        ozelHaritaElmalari.push({ x: x, y: y, tip: seciliMeyveTipi });
                    }
                }
            }
            editorCiz();
        }

        function editorTemizle() {
            ozelHaritaElmalari = [];
            editorCiz();
        }

        // Editörde Tıklama/Sürükleme ile Çizim
        let cizimYapiliyor = false;
        let silmeModu = false;

        function editorTiklamaIsle(e, ilkTiklamaMi) {
            if (document.getElementById('ekran-editor').classList.contains('aktif-ekran') === false) return;

            let rect = canvas.getBoundingClientRect();
            let dokunmaX = e.touches ? e.touches[0].clientX : e.clientX;
            let dokunmaY = e.touches ? e.touches[0].clientY : e.clientY;

            let x = Math.floor((dokunmaX - rect.left) / hucreBoyutu) * hucreBoyutu;
            let y = Math.floor((dokunmaY - rect.top) / hucreBoyutu) * hucreBoyutu;

            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;
            if (x === Math.floor(hucreSayisi/2)*hucreBoyutu && y === Math.floor(hucreSayisi/2)*hucreBoyutu) return; // Merkez koruması

            let varOlanIndex = ozelHaritaElmalari.findIndex(el => el.x === x && el.y === y);

            if (ilkTiklamaMi) {
                silmeModu = (varOlanIndex > -1); // Eğer tıklanan yerde elma varsa silme moduna geç
            }

            if (silmeModu && varOlanIndex > -1) {
                ozelHaritaElmalari.splice(varOlanIndex, 1);
            } else if (!silmeModu && varOlanIndex === -1) {
                ozelHaritaElmalari.push({ x: x, y: y, tip: seciliMeyveTipi });
            }

            editorCiz();
        }

        canvas.addEventListener('mousedown', e => { cizimYapiliyor = true; editorTiklamaIsle(e, true); });
        canvas.addEventListener('mousemove', e => { if(cizimYapiliyor) editorTiklamaIsle(e, false); });
        window.addEventListener('mouseup', () => { cizimYapiliyor = false; });

        canvas.addEventListener('touchstart', e => { e.preventDefault(); cizimYapiliyor = true; editorTiklamaIsle(e, true); }, {passive: false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if(cizimYapiliyor) editorTiklamaIsle(e, false); }, {passive: false});
        window.addEventListener('touchend', () => { cizimYapiliyor = false; });

        function editorCiz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            izgaraCiz();
            ozelHaritaElmalari.forEach(elma => meyveCiz(elma.x, elma.y, elma.tip));
            
            // Yılan Merkezi Gösterimi
            ctx.fillStyle = seciliYilanRengi; ctx.globalAlpha = 0.5;
            ctx.fillRect(Math.floor(hucreSayisi/2)*hucreBoyutu, Math.floor(hucreSayisi/2)*hucreBoyutu, hucreBoyutu-1, hucreBoyutu-1);
            ctx.globalAlpha = 1.0;
        }


        // --- OYUN FONKSİYONLARI ---
        function oyunuBaslat(ozelHaritaGecerliMi) {
            gecerliModOzelMi = ozelHaritaGecerliMi;
            ekranGoster('ekran-oyun');
            document.getElementById('oyun-canvas-yeri').appendChild(canvas);
            
            if (!ozelHaritaGecerliMi) {
                hucreSayisi = 18; // Normal mod boyutu
            }
            canvasMuncelle();
            
            // Değişkenleri Sıfırla
            yilan.x = Math.floor(hucreSayisi/2) * hucreBoyutu;
            yilan.y = Math.floor(hucreSayisi/2) * hucreBoyutu;
            yilan.kuyruk = [];
            yilan.uzunluk = 4;
            yilan.dx = hucreBoyutu; yilan.dy = 0;
            
            skor = 0; document.getElementById('skor-yazi').innerText = skor;
            tabanHiz = 10; gecerliHiz = tabanHiz;
            aktifBuff = null; buffSuresi = 0; document.getElementById('buff-yazisi').innerText = "";
            yonDegistiMi = false;

            if (ozelHaritaGecerliMi) {
                elmalar = ozelHaritaElmalari.map(e => ({ x: e.x, y: e.y, tip: e.tip, sure: null }));
                if (elmalar.length === 0) rastgeleMeyveOlustur('normal');
            } else {
                elmalar = [];
                rastgeleMeyveOlustur('normal');
            }

            isGameRunning = true;
            cancelAnimationFrame(oyunDongusu);
            oyunDongusu = requestAnimationFrame(oyunMotoru);
        }

        function rastgeleMeyveOlustur(tip) {
            // Güvenlik kilidi: Harita tamamen doluysa kilitlenme.
            if (yilan.kuyruk.length + elmalar.length >= hucreSayisi * hucreBoyutu) return;

            let yerlestirildi = false;
            while (!yerlestirildi) {
                let rx = Math.floor(Math.random() * hucreSayisi) * hucreBoyutu;
                let ry = Math.floor(Math.random() * hucreSayisi) * hucreBoyutu;
                
                let yilanUstunde = yilan.kuyruk.some(h => h.x === rx && h.y === ry) || (yilan.x === rx && yilan.y === ry);
                let elmaUstunde = elmalar.some(e => e.x === rx && e.y === ry);

                if (!yilanUstunde && !elmaUstunde) {
                    let sureLimiti = (tip !== 'normal') ? 150 : null; // Özel meyveler kaybolur
                    elmalar.push({ x: rx, y: ry, tip: tip, sure: sureLimiti });
                    yerlestirildi = true;
                }
            }
        }

        function yonAyarla(yon) {
            if (yonDegistiMi || !isGameRunning) return;
            if (yon === 'yukari' && yilan.dy === 0) { yilan.dy = -hucreBoyutu; yilan.dx = 0; yonDegistiMi = true; }
            if (yon === 'asagi' && yilan.dy === 0) { yilan.dy = hucreBoyutu; yilan.dx = 0; yonDegistiMi = true; }
            if (yon === 'sola' && yilan.dx === 0) { yilan.dx = -hucreBoyutu; yilan.dy = 0; yonDegistiMi = true; }
            if (yon === 'saga' && yilan.dx === 0) { yilan.dx = hucreBoyutu; yilan.dy = 0; yonDegistiMi = true; }
        }

        // Klavye Kontrolü
        document.addEventListener('keydown', e => {
            if (!isGameRunning) return;
            if (e.key === 'ArrowUp' || e.key === 'w') yonAyarla('yukari');
            if (e.key === 'ArrowDown' || e.key === 's') yonAyarla('asagi');
            if (e.key === 'ArrowLeft' || e.key === 'a') yonAyarla('sola');
            if (e.key === 'ArrowRight' || e.key === 'd') yonAyarla('saga');
        });

        // Ekran Butonları Kontrolü
        ['yukari', 'asagi', 'sola', 'saga'].forEach(id => {
            let btn = document.getElementById(id);
            btn.onmousedown = () => yonAyarla(id);
            btn.ontouchstart = (e) => { e.preventDefault(); yonAyarla(id); }; // Mobil hızlandırma
        });

        function izgaraCiz() {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += hucreBoyutu) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y <= canvas.height; y += hucreBoyutu) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
        }

        function meyveCiz(x, y, tip, sure) {
            if (tip === 'normal') ctx.fillStyle = '#e74c3c'; // Kırmızı
            else if (tip === 'speed') ctx.fillStyle = '#f39c12'; // Turuncu
            else if (tip === 'slow') ctx.fillStyle = '#3498db'; // Mavi
            else if (tip === 'poison') ctx.fillStyle = '#9b59b6'; // Mor

            // Yanıp sönme efekti (kaybolmasına az kaldıysa)
            if (sure && sure < 30 && sure % 4 < 2) ctx.fillStyle = 'transparent';
            
            ctx.fillRect(x, y, hucreBoyutu - 1, hucreBoyutu - 1);
        }

        function oyunMotoru() {
            if (!isGameRunning) return;
            oyunDongusu = requestAnimationFrame(oyunMotoru);

            // Buff Kontrolü
            if (buffSuresi > 0) {
                buffSuresi--;
                if (buffSuresi <= 0) {
                    gecerliHiz = tabanHiz;
                    aktifBuff = null;
                    document.getElementById('buff-yazisi').innerText = "";
                }
            }

            // Hız ayarlayıcı
            if (++cerceveSayaci < gecerliHiz) return;
            cerceveSayaci = 0;
            yonDegistiMi = false;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            izgaraCiz();

            // Yılanı Hareket Ettir
            yilan.x += yilan.dx;
            yilan.y += yilan.dy;

            // Duvara Çarpma Kontrolü
            if (yilan.x < 0 || yilan.x >= canvas.width || yilan.y < 0 || yilan.y >= canvas.height) {
                oyunuBitir(); return;
            }

            yilan.kuyruk.unshift({ x: yilan.x, y: yilan.y });
            if (yilan.kuyruk.length > yilan.uzunluk) yilan.kuyruk.pop();

            // Meyveleri Çiz ve Sürelerini Düşür
            for (let i = elmalar.length - 1; i >= 0; i--) {
                let elma = elmalar[i];
                meyveCiz(elma.x, elma.y, elma.tip, elma.sure);

                if (elma.sure !== null) {
                    elma.sure--;
                    if (elma.sure <= 0) elmalar.splice(i, 1);
                }
            }

            // Yılanı Çiz ve Çarpışmaları Kontrol Et
            ctx.fillStyle = seciliYilanRengi;
            yilan.kuyruk.forEach(function(hucre, index) {
                ctx.fillRect(hucre.x, hucre.y, hucreBoyutu - 1, hucreBoyutu - 1);

                // Yılan Elma Yedi mi?
                for (let i = 0; i < elmalar.length; i++) {
                    if (hucre.x === elmalar[i].x && hucre.y === elmalar[i].y) {
                        let yenen = elmalar.splice(i, 1)[0];
                        uygulaMeyveEtkisi(yenen.tip);
                        break;
                    }
