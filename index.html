<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan: KADO Sürümü</title>
    <style>
        /* EN TEMEL VE HATASIZ CSS TASARIMI */
        body {
            margin: 0; padding: 0; background-color: #121212; color: #fff;
            font-family: Arial, sans-serif; display: flex; flex-direction: column;
            align-items: center; height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .ekran {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 10px; box-sizing: border-box;
        }

        .aktif { display: flex !important; }

        /* Butonlar */
        .btn {
            background-color: #39ff14; color: #000; border: none; border-radius: 8px;
            padding: 15px 20px; font-size: 18px; font-weight: bold; margin: 10px 0; 
            width: 90%; max-width: 300px; cursor: pointer; box-shadow: 0 4px 0 #209907;
            text-align: center; text-transform: uppercase; outline: none;
            font-family: 'Courier New', Courier, monospace;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-koyu { background-color: #2c3e50; color: #fff; box-shadow: 0 4px 0 #151e27; }
        .btn-kirmizi { background-color: #e74c3c; color: #fff; box-shadow: 0 4px 0 #9c2b1f; }

        /* Seçim Kutuları */
        .kutu-secim { display: flex; gap: 15px; margin: 15px 0; background: #222; padding: 10px; border-radius: 10px; }
        .renk-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .renk-btn.secili { border-color: #fff; transform: scale(1.1); }
        .meyve-btn { font-size: 24px; padding: 5px 10px; cursor: pointer; opacity: 0.4; }
        .meyve-btn.secili { opacity: 1; border-bottom: 2px solid #39ff14; }

        /* Oyun ve Canvas */
        canvas { background-color: #050a05; border: 3px solid #333; border-radius: 5px; touch-action: none; max-width: 95vw; }
        
        .oyun-ust-bilgi { display: flex; justify-content: space-between; width: 100%; max-width: 320px; margin-bottom: 10px; font-size: 16px; font-weight: bold;}
        #buff-yazi { color: #f1c40f; }

        /* Yön Tuşları */
        .yon-paneli { display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; gap: 10px; margin-top: 15px; touch-action: none; }
        .yon-btn {
            background-color: #333; color: #fff; font-size: 30px; border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 0 #111;
        }
        .yon-btn:active { background-color: #39ff14; color: #000; transform: translateY(5px); box-shadow: none; }
        #yukari { grid-column: 2; grid-row: 1; }
        #sola { grid-column: 1; grid-row: 2; }
        #saga { grid-column: 3; grid-row: 2; }
        #asagi { grid-column: 2; grid-row: 3; }
        
        #surum { position: fixed; bottom: 5px; right: 5px; color: #444; font-size: 10px; }
    </style>
</head>
<body>

    <div id="hata-ekrani" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:red; color:white; padding:20px; z-index:9999;"></div>

    <div id="ekran-menu" class="ekran aktif">
        <h1 style="color: #39ff14; font-size: 50px; margin: 0 0 10px 0; font-family: 'Courier New', Courier, monospace;">SNAKE</h1>
        <p style="color: #aaa; margin: 0;">Yılan Rengini Seç</p>
        
        <div class="kutu-secim">
            <div class="renk-btn secili" style="background: #39ff14;" onclick="renkAyarla(this, '#39ff14')"></div>
            <div class="renk-btn" style="background: #3498db;" onclick="renkAyarla(this, '#3498db')"></div>
            <div class="renk-btn" style="background: #f1c40f;" onclick="renkAyarla(this, '#f1c40f')"></div>
            <div class="renk-btn" style="background: #e74c3c;" onclick="renkAyarla(this, '#e74c3c')"></div>
        </div>

        <button class="btn" onclick="oyunaGec(false)">▶ OYUNA BAŞLA</button>
        <button class="btn btn-koyu" onclick="ekranDegistir('ekran-editor')">🛠️ ÖZEL HARİTA YAP</button>
        <button class="btn btn-kirmizi" onclick="kadoModunuBaslat()">👑 KADO MODU 👑</button>
    </div>

    <div id="ekran-editor" class="ekran">
        <h2 style="color: #3498db; margin: 0 0 5px 0; font-family: 'Courier New';">HARİTA YAPICI</h2>
        <p style="font-size: 12px; color: #888; margin: 0 0 10px 0;">Ekrana sürükleyerek meyve diz</p>
        
        <div class="kutu-secim" style="margin-top: 0; padding: 5px;">
            <div class="meyve-btn secili" onclick="meyveAyarla(this, 'normal')">🍎</div>
            <div class="meyve-btn" onclick="meyveAyarla(this, 'hiz')">⚡</div>
            <div class="meyve-btn" onclick="meyveAyarla(this, 'yavas')">❄️</div>
            <div class="meyve-btn" onclick="meyveAyarla(this, 'zehir')">☠️</div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 320px;">
            <button class="btn btn-koyu" style="margin:0; padding: 10px; flex:1; font-size:14px;" onclick="editorDoldur()">Doldur</button>
            <button class="btn btn-kirmizi" style="margin:0; padding: 10px; flex:1; font-size:14px;" onclick="editorTemizle()">Temizle</button>
        </div>

        <canvas id="canvasEditor" width="288" height="288"></canvas>

        <button class="btn" style="margin-top: 15px;" onclick="oyunaGec(true)">BU HARİTAYI OYNA</button>
        <button class="btn btn-koyu" onclick="ekranDegistir('ekran-menu')">ANA MENÜ</button>
    </div>

    <div id="ekran-oyun" class="ekran">
        <div class="oyun-ust-bilgi">
            <span>Skor: <span id="skorYazi" style="color: #fff;">0</span></span>
            <span id="buffYazi"></span>
            <span>Rekor: <span id="rekorYazi" style="color: #f1c40f;">0</span></span>
        </div>

        <canvas id="canvasOyun" width="288" height="288"></canvas>

        <div class="yon-paneli">
            <div id="yukari" class="yon-btn" ontouchstart="yonSec('yukari')" onmousedown="yonSec('yukari')">▲</div>
            <div id="sola" class="yon-btn" ontouchstart="yonSec('sola')" onmousedown="yonSec('sola')">◀</div>
            <div id="saga" class="yon-btn" ontouchstart="yonSec('saga')" onmousedown="yonSec('saga')">▶</div>
            <div id="asagi" class="yon-btn" ontouchstart="yonSec('asagi')" onmousedown="yonSec('asagi')">▼</div>
        </div>
        
        <div id="oyun-sonu" style="display: none; flex-direction: column; position: absolute; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; text-align: center; border: 2px solid #e74c3c;">
            <h2 style="color: #e74c3c; margin-top:0;">OYUN BİTTİ</h2>
            <button class="btn" onclick="oyunaGec(modOzelMi)">TEKRAR DENE</button>
            <button class="btn btn-koyu" onclick="ekranDegistir('ekran-menu')">ANA MENÜ</button>
        </div>
    </div>

    <div id="surum">Sürüm 5.1 (KADO)</div>

    <script>
        window.onerror = function(mesaj, kaynak, satir) {
            let hataEkrani = document.getElementById('hata-ekrani');
            hataEkrani.style.display = 'block';
            hataEkrani.innerHTML = "<h3>HATA:</h3><br>" + mesaj + "<br>Satır: " + satir;
        };

        var hucre = 16;
        var boyut = 18; // 18x18
        var yilanRengi = '#39ff14';
        var aktifMeyveTipi = 'normal';
        var modOzelMi = false;

        var yilan = { x: 0, y: 0, dx: hucre, dy: 0, kuyruk: [], uzunluk: 4 };
        var meyveler = []; 
        var ozelMeyveler = []; 

        var skor = 0; var rekor = 0;
        var hiz = 10; var sayac = 0;
        var yonKilit = false;
        var buffSuresi = 0;
        var oyunAktif = false;
        var animasyonId;

        try {
            rekor = localStorage.getItem('snakeV5Rekor') || 0;
            document.getElementById('rekorYazi').innerText = rekor;
        } catch(e) { }

        var cEditor = document.getElementById('canvasEditor');
        var ctxEditor = cEditor.getContext('2d');
        var cOyun = document.getElementById('canvasOyun');
        var ctxOyun = cOyun.getContext('2d');

        function ekranDegistir(ekranId) {
            document.getElementById('ekran-menu').classList.remove('aktif');
            document.getElementById('ekran-editor').classList.remove('aktif');
            document.getElementById('ekran-oyun').classList.remove('aktif');
            document.getElementById('oyun-sonu').style.display = 'none';
            
            document.getElementById(ekranId).classList.add('aktif');
            oyunAktif = false;
            cancelAnimationFrame(animasyonId);

            if (ekranId === 'ekran-editor') {
                boyut = 18; // Editör her açıldığında varsayılan 18x18 olsun
                cEditor.width = boyut * hucre; cEditor.height = boyut * hucre;
                editorCiz();
            }
        }

        function renkAyarla(el, renk) {
            document.querySelectorAll('.renk-btn').forEach(b => b.classList.remove('secili'));
            el.classList.add('secili');
            yilanRengi = renk;
        }

        function meyveAyarla(el, tip) {
            document.querySelectorAll('.meyve-btn').forEach(b => b.classList.remove('secili'));
            el.classList.add('secili');
            aktifMeyveTipi = tip;
        }

        // --- ÖZEL KADO HARİTASI OLUŞTURUCU ---
        function kadoModunuBaslat() {
            boyut = 18;
            cOyun.width = boyut * hucre;
            cOyun.height = boyut * hucre;
            
            ozelMeyveler = [];
            var h = hucre;
            
            // Kolay meyve ekleme fonksiyonu
            function ekle(col, row) { ozelMeyveler.push({x: col*h, y: row*h, tip: 'normal'}); }

            // O Harfi (Üst Sol)
            [2,3,4,5].forEach(c => { ekle(c,2); ekle(c,8); }); // Üst ve Alt Çizgi
            [3,4,5,6,7].forEach(r => { ekle(2,r); ekle(5,r); }); // Sol ve Sağ Çizgi

            // C Harfi (Üst Sağ)
            [10,11,12,13,14].forEach(c => { ekle(c,2); ekle(c,8); }); // Üst ve Alt Çizgi
            [3,4,5,6,7].forEach(r => { ekle(10,r); }); // Sol Çizgi

            // K Harfi (Alt)
            [11,12,13,14,15,16].forEach(r => { ekle(1,r); }); // Gövde
            ekle(4,11); ekle(3,12); ekle(2,13); // Üst Kol
            ekle(2,14); ekle(3,15); ekle(4,16); // Alt Kol

            // A Harfi (Alt)
            ekle(6,11); // Tepe Noktası
            [12,13,14,15,16].forEach(r => { ekle(5,r); ekle(7,r); }); // Bacaklar
            ekle(6,14); // Orta Çizgi

            // D Harfi (Alt)
            [11,12,13,14,15,16].forEach(r => { ekle(9,r); }); // Gövde
            ekle(10,11); ekle(11,11); // Üst Çizgi
            ekle(10,16); ekle(11,16); // Alt Çizgi
            [12,13,14,15].forEach(r => { ekle(12,r); }); // Sağ Kavis

            // O Harfi (Alt)
            [14,15,16].forEach(c => { ekle(c,11); ekle(c,16); }); // Üst ve Alt Çizgi
            [12,13,14,15].forEach(r => { ekle(14,r); ekle(16,r); }); // Sol ve Sağ Çizgi

            oyunaGec(true);
        }

        // --- HARİTA EDİTÖRÜ ---
        function editorDoldur() {
            ozelMeyveler = [];
            var mx = Math.floor(boyut/2) * hucre; var my = Math.floor(boyut/2) * hucre;
            for (var r = 0; r < boyut; r++) {
                for (var c = 0; c < boyut; c++) {
                    var hx = c * hucre; var hy = r * hucre;
                    if (hx !== mx || hy !== my) ozelMeyveler.push({x: hx, y: hy, tip: aktifMeyveTipi});
                }
            }
            editorCiz();
        }

        function editorTemizle() { ozelMeyveler = []; editorCiz(); }

        var ciziyor = false; var silmeModu = false;
        cEditor.onmousedown = function(e) { ciziyor = true; editorTikla(e, true); };
        cEditor.onmousemove = function(e) { if(ciziyor) editorTikla(e, false); };
        window.onmouseup = function() { ciziyor = false; };
        
        cEditor.ontouchstart = function(e) { e.preventDefault(); ciziyor = true; editorTikla(e.touches[0], true); };
        cEditor.ontouchmove = function(e) { e.preventDefault(); if(ciziyor) editorTikla(e.touches[0], false); };
        window.ontouchend = function() { ciziyor = false; };

        function editorTikla(e, ilk) {
            var rect = cEditor.getBoundingClientRect();
            var x = e.clientX - rect.left; var y = e.clientY - rect.top;
            var hx = Math.floor(x / hucre) * hucre; var hy = Math.floor(y / hucre) * hucre;
            
            if (hx < 0 || hx >= cEditor.width || hy < 0 || hy >= cEditor.height) return;
            if (hx === Math.floor(boyut/2)*hucre && hy === Math.floor(boyut/2)*hucre) return; // Yılan merkezi korunur

            var index = ozelMeyveler.findIndex(m => m.x === hx && m.y === hy);
            if (ilk) silmeModu = (index > -1);

            if (silmeModu && index > -1) ozelMeyveler.splice(index, 1);
            else if (!silmeModu && index === -1) ozelMeyveler.push({x: hx, y: hy, tip: aktifMeyveTipi});
            editorCiz();
        }

        function editorCiz() {
            ctxEditor.clearRect(0, 0, cEditor.width, cEditor.height);
            izgaraCiz(ctxEditor, cEditor);
            ozelMeyveler.forEach(m => meyveCiz(ctxEditor, m.x, m.y, m.tip));
            ctxEditor.fillStyle = yilanRengi; ctxEditor.globalAlpha = 0.5;
            ctxEditor.fillRect(Math.floor(boyut/2)*hucre, Math.floor(boyut/2)*hucre, hucre-1, hucre-1);
            ctxEditor.globalAlpha = 1.0;
        }

        // --- OYUN ÇEKİRDEĞİ ---
        function oyunaGec(ozelMi) {
            modOzelMi = ozelMi;
            ekranDegistir('ekran-oyun');
            
            if(!ozelMi) boyut = 18; // Normal oyun 18x18 başlar
            cOyun.width = boyut * hucre; cOyun.height = boyut * hucre;

            yilan.x = Math.floor(boyut/2) * hucre; yilan.y = Math.floor(boyut/2) * hucre;
            yilan.kuyruk = []; yilan.uzunluk = 4; yilan.dx = hucre; yilan.dy = 0;
            
            skor = 0; document.getElementById('skorYazi').innerText = skor;
            hiz = 10; buffSuresi = 0; document.getElementById('buffYazi').innerText = "";
            yonKilit = false;
            
            if (ozelMi) {
                meyveler = [];
                for(var i=0; i<ozelMeyveler.length; i++) {
                    meyveler.push({x: ozelMeyveler[i].x, y: ozelMeyveler[i].y, tip: ozelMeyveler[i].tip, sure: null});
                }
                if (meyveler.length === 0) rasgeleMeyveAt('normal');
            } else {
                meyveler = []; rasgeleMeyveAt('normal');
            }

            oyunAktif = true;
            animasyonId = requestAnimationFrame(oyunDongusu);
        }

        function rasgeleMeyveAt(tip) {
            if (yilan.kuyruk.length + meyveler.length >= boyut * boyut) return; // Çökme koruması
            var yerlesti = false;
            while (!yerlesti) {
                var rx = Math.floor(Math.random() * boyut) * hucre;
                var ry = Math.floor(Math.random() * boyut) * hucre;
                var carpisma = yilan.kuyruk.some(k => k.x === rx && k.y === ry) || meyveler.some(m => m.x === rx && m.y === ry) || (yilan.x === rx && yilan.y === ry);
                if (!carpisma) {
                    var kalmaSuresi = (tip !== 'normal') ? 150 : null;
                    meyveler.push({x: rx, y: ry, tip: tip, sure: kalmaSuresi});
                    yerlesti = true;
                }
            }
        }

        function yonSec(yon) {
            if (yonKilit || !oyunAktif) return;
            if (yon === 'yukari' && yilan.dy === 0) { yilan.dy = -hucre; yilan.dx = 0; yonKilit = true; }
            else if (yon === 'asagi' && yilan.dy === 0) { yilan.dy = hucre; yilan.dx = 0; yonKilit = true; }
            else if (yon === 'sola' && yilan.dx === 0) { yilan.dx = -hucre; yilan.dy = 0; yonKilit = true; }
            else if (yon === 'saga' && yilan.dx === 0) { yilan.dx = hucre; yilan.dy = 0; yonKilit = true; }
        }

        document.addEventListener('keydown', e => {
            if (!oyunAktif) return;
            if (e.key === 'ArrowUp' || e.key === 'w') yonSec('yukari');
            if (e.key === 'ArrowDown' || e.key === 's') yonSec('asagi');
            if (e.key === 'ArrowLeft' || e.key === 'a') yonSec('sola');
            if (e.key === 'ArrowRight' || e.key === 'd') yonSec('saga');
        });

        function izgaraCiz(hedefCtx, hedefCanvas) {
            hedefCtx.strokeStyle = '#222'; hedefCtx.lineWidth = 1;
            for (var x = 0; x <= hedefCanvas.width; x += hucre) { hedefCtx.beginPath(); hedefCtx.moveTo(x, 0); hedefCtx.lineTo(x, hedefCanvas.height); hedefCtx.stroke(); }
            for (var y = 0; y <= hedefCanvas.height; y += hucre) { hedefCtx.beginPath(); hedefCtx.moveTo(0, y); hedefCtx.lineTo(hedefCanvas.width, y); hedefCtx.stroke(); }
        }

        function meyveCiz(hedefCtx, x, y, tip, sure) {
            if (tip === 'normal') hedefCtx.fillStyle = '#e74c3c';
            else if (tip === 'hiz') hedefCtx.fillStyle = '#f39c12';
            else if (tip === 'yavas') hedefCtx.fillStyle = '#3498db';
            else if (tip === 'zehir') hedefCtx.fillStyle = '#9b59b6';
            if (sure && sure < 30 && sure % 4 < 2) hedefCtx.fillStyle = 'transparent'; 
            hedefCtx.fillRect(x, y, hucre-1, hucre-1);
        }

        function oyunDongusu() {
            if (!oyunAktif) return;
            animasyonId = requestAnimationFrame(oyunDongusu);

            if (buffSuresi > 0) {
                buffSuresi--;
                if (buffSuresi <= 0) { hiz = 10; document.getElementById('buffYazi').innerText = ""; }
            }

            if (++sayac < hiz) return;
            sayac = 0; yonKilit = false;

            ctxOyun.clearRect(0, 0, cOyun.width, cOyun.height); izgaraCiz(ctxOyun, cOyun);
            
            yilan.x += yilan.dx; yilan.y += yilan.dy;

            if (yilan.x < 0 || yilan.x >= cOyun.width || yilan.y < 0 || yilan.y >= cOyun.height) { oyunuBitir(); return; }

            yilan.kuyruk.unshift({x: yilan.x, y: yilan.y});
            if (yilan.kuyruk.length > yilan.uzunluk) yilan.kuyruk.pop();

            for (var i = meyveler.length - 1; i >= 0; i--) {
                var m = meyveler[i];
                meyveCiz(ctxOyun, m.x, m.y, m.tip, m.sure);
                if (m.sure !== null) { m.sure--; if(m.sure <= 0) meyveler.splice(i, 1); }
            }

            ctxOyun.fillStyle = yilanRengi;
            for (var i = 0; i < yilan.kuyruk.length; i++) {
                var hucreObj = yilan.kuyruk[i];
                ctxOyun.fillRect(hucreObj.x, hucreObj.y, hucre-1, hucre-1);

                for (var j = 0; j < meyveler.length; j++) {
                    if (hucreObj.x === meyveler[j].x && hucreObj.y === meyveler[j].y) {
                        var yenen = meyveler.splice(j, 1)[0];
                        
                        if (yenen.tip === 'normal') {
                            skor += 10; yilan.uzunluk++;
                            if (skor % 50 === 0 && hiz > 3) hiz--;
                            if (!modOzelMi && Math.random() < 0.3) {
                                var tipler = ['hiz', 'yavas', 'zehir'];
                                rasgeleMeyveAt(tipler[Math.floor(Math.random()*3)]);
                            }
                        } else if (yenen.tip === 'hiz') {
                            skor += 20; buffSuresi = 100; hiz = 4;
                            document.getElementById('buffYazi').innerText = "HIZLANDIN!"; document.getElementById('buffYazi').style.color = "#f39c12";
                        } else if (yenen.tip === 'yavas') {
                            skor += 10; buffSuresi = 100; hiz = 15;
